- name: Deploy server into host
  hosts: localhosts
  roles:
    - { role: common, tags: common }
    - { role: nginx, tags: nginx }
    - { role: postgres, tags: postgres }
    - { role: php, tags: php }
    - { role: phpmyadmin, tags: phpmyadmin }
    - { role: redis, tags: redis }
    - { role: ftp, tags: ftp }